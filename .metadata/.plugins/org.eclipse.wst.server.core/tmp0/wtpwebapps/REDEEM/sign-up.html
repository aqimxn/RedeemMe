<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!----======== CSS ======== -->
    <link rel="stylesheet" href="assets/css/sign-up.css">
     
    <!----===== Iconscout CSS ===== -->
    <link rel="shortcut icon" href="assets/images/favicon.ico" />
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">

   <title>Registration Form</title>
</head>
<body>
    <div class="container">
        <header>
            <span>Registration</span>
            <span class="goto-login">Already have account? <a href="login.html">log in</a></span>
        </header>

        <form action="AddUserController" method="POST">
            <div class="form first">
                <div class="details personal">
                    <span class="title">Personal Details</span>

                    <div class="fields">
                        <div class="input-field">
                            <label>First Name</label>
                            <input type="text" name="first-name" placeholder="Enter your first name" required>
                        </div>

                        <div class="input-field">
                            <label>Last Name</label>
                            <input type="text" name="last-name" placeholder="Enter your last name" required>
                        </div>

                        <div class="input-field">
                            <label>Email</label>
                            <input type="email" name="email" placeholder="Enter your email" required>
                        </div>

                        <div class="input-field">
                            <label>Password</label>
                            <input type="password" name="password" placeholder="Enter your password" required>
                        </div>

                        <div class="input-field">
                            <label>Mobile Number</label>
                            <input type="number" name="contact" placeholder="Enter your mobile number" required>
                        </div>

                        <div class="input-field">
                            <label>Profile picture (optional)</label>
                            <input type="text" id="image" name="image"><!--  accept="image/jpeg, image/png" -->
                        </div>
                    </div>
                </div>

                <div class="details ID">
                    <span class="title">Identity Details</span>

                    <div class="fields">
                        <div class="input-field">
                            <label>Address 1</label>
                            <input type="text" name="address1" placeholder="Enter your first address" required>
                        </div>

                        <div class="input-field">
                            <label>Address 2</label>
                            <input type="text" name="address2" placeholder="Enter your second address" required>
                        </div>

                        <div class="input-field">
                            <label>Postcode</label>
                            <input type="number" name="postcode" placeholder="Enter your postcode" required>
                        </div>

                        <div class="input-field">
                            <label>City</label>
                            <input type="text" name="city" placeholder="Enter your city" required>
                        </div>

                        <div class="input-field">
                            <label for="state">State</label>
                            <select id="state" name="state" required>
                                <option disabled selected>Select state</option>
                                <option value="Johor">Johor</option>
                                <option value="Kedah">Kedah</option>
                                <option value="Kelantan">Kelantan</option>
                                <option value="Melaka">Melaka</option>
                                <option value="Negeri Sembilan">Negeri Sembilan</option>
                                <option value="Pahang">Pahang</option>
                                <option value="Perak">Perak</option>
                                <option value="Perlis">Perlis</option>
                                <option value="Pulau Pinang">Pulau Pinang</option>
                                <option value="Sabah">Sabah</option>
                                <option value="Sarawak">Sarawak</option>
                                <option value="Selangor">Selangor</option>
                                <option value="Terengganu">Terengganu</option>
                                <option value="Wilayah Persekutuan Kuala Lumpur">Wilayah Persekutuan Kuala Lumpur</option>
                            </select>
                        </div>

                    </div>

                    <button class="nextBtn" type="submit">
                        Submit
                        <i class="uil uil-navigator"></i>
                    </button>
                    
                </div> 
            </div>
        </form>
    </div>
</body>
</html>
